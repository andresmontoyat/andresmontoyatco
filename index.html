<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="preload"
      as="image"
      type="image/webp"
      href="/me-800.webp"
      imagesrcset="/me-400.webp 400w, /me-800.webp 800w, /me-1600.webp 1600w"
      imagesizes="100vw"
      fetchpriority="high"
    />
    <meta name="theme-color" content="#0B1020" />
    <meta
      name="description"
      content="Carlos Andrés Montoya Tobón — Solutions Architect and Senior Backend Engineer with 18+ years of experience in Java, Spring, microservices and cloud."
    />
    <!-- Open Graph — static fallbacks (crawlers read these; JS updates override at runtime for users) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://andresmontoyat.co/" />
    <meta property="og:image" content="https://andresmontoyat.co/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://andresmontoyat.co/og-image.png" />

    <!-- Dynamic targets — JavaScript updates these per language at runtime -->
    <meta property="og:title" content="Carlos Andrés Montoya Tobón · Solutions Architect &amp; Senior Backend Engineer" />
    <meta property="og:description" content="Carlos Andrés Montoya Tobón — Solutions Architect and Senior Backend Engineer with 18+ years of experience in Java, Spring, microservices and cloud." />
    <meta name="twitter:title" content="Carlos Andrés Montoya Tobón · Solutions Architect &amp; Senior Backend Engineer" />
    <meta name="twitter:description" content="Carlos Andrés Montoya Tobón — Solutions Architect and Senior Backend Engineer with 18+ years of experience in Java, Spring, microservices and cloud." />

    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Carlos Andrés Montoya Tobón · Solutions Architect &amp; Senior Backend Engineer</title>
    <!-- Critical CSS — static hero layer paints before React hydrates (kills LCP render delay) -->
    <style>
      :root {
        --hero-photo-filter: grayscale(0.2) brightness(0.35);
        --hero-overlay: linear-gradient(180deg, rgba(13, 13, 26, 0.4) 0%, rgba(13, 13, 26, 0.95) 75%);
      }
      html, body { margin: 0; padding: 0; background: #0D0D1A; }
      #hero-static { position: absolute; top: 0; left: 0; right: 0; height: 100vh; z-index: 0; overflow: hidden; pointer-events: none; }
      #hero-static img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 30%; filter: var(--hero-photo-filter); }
      #hero-static .hero-static-ovl { position: absolute; inset: 0; background: var(--hero-overlay); }
      #root { position: relative; z-index: 1; }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4TZJGR3MXR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4TZJGR3MXR');
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="hero-static">
      <img
        src="/me-800.webp"
        srcset="/me-400.webp 400w, /me-800.webp 800w, /me-1600.webp 1600w"
        sizes="100vw"
        alt="Carlos Andrés Montoya Tobón"
        fetchpriority="high"
      />
      <div class="hero-static-ovl" aria-hidden="true"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
